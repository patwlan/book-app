spring:
  datasource:
    url: jdbc:h2:file:./data/book-app;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
  jackson:
    time-zone: UTC

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  error:
    include-message: always

app:
  cors:
    allowed-origin-patterns: http://localhost:*,http://127.0.0.1:*

